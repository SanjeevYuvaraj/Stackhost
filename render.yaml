services:
  - type: web
    plan: free
    name: mha
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m MHA
    repo: https://github.com/SanjeevYuvaraj/stackhost-BOT.git      
    branch: main
    envVars:
      - key: BOT_TOKEN 
        sync: false
      - key: API_ID 
        sync: false
      - key: API_HASH 
        sync: false
    autoDeploy: false
